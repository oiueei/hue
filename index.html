<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OIUEEI Hue 💡</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 32rem;
        margin: 4rem auto;
        padding: 0 1rem;
        text-align: center;
      }
      h1 { font-size: 2.5rem; }
      button {
        font-size: 1.1rem;
        padding: 0.8rem 1.6rem;
        margin: 0.4rem;
        border: 2px solid #0000bf;
        border-radius: 8px;
        background: #0000bf;
        color: white;
        cursor: pointer;
      }
      button.secondary { background: white; color: #0000bf; }
      pre {
        text-align: left;
        background: #f2f2f2;
        padding: 1rem;
        border-radius: 8px;
        overflow: auto;
        min-height: 2rem;
      }
    </style>
  </head>
  <body>
    <h1>OIUEEI Hue 💡</h1>
    <p>Control the Philips Hue light.</p>
    <button onclick="call('trigger')">Blink</button>
    <button class="secondary" onclick="call('stop')">Stop</button>
    <button class="secondary" onclick="call('lights')">List lights</button>
    <pre id="out"></pre>
    <script>
      async function call(action) {
        const out = document.getElementById("out");
        out.textContent = "…";
        try {
          const res = await fetch("/api/hue?action=" + action);
          out.textContent = JSON.stringify(await res.json(), null, 2);
        } catch (e) {
          out.textContent = "Error: " + e.message;
        }
      }
    </script>
  </body>
</html>
